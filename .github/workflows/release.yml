name: Release

# Publishes to npm when a version tag (e.g. v0.2.0) is pushed.
on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write # required for OIDC trusted publishing + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm
      # Trusted Publishing (OIDC) needs npm >= 11.5.1; Node 20 ships npm 10, and
      # npm@latest no longer supports Node 20, so pin to the npm 11 line.
      - run: npm install -g npm@11
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm run typecheck
      - run: npm run build
      - run: npm test
      - run: npm publish --access public
